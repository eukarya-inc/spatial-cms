events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Large body for geometry imports
    client_max_body_size 10m;

    server {
        listen 80;
        server_name _;

        # Public: Delivery API (protected by API Key)
        location /api/v1/delivery/ {
            proxy_pass http://cms:3001;
        }

        # Public: OGC API (no auth)
        location /api/v1/ogc/ {
            proxy_pass http://cms:3001;
        }

        # Public: Health check
        location /health {
            proxy_pass http://cms:3001;
        }

        # Public: Viewer app
        location /viewer/ {
            rewrite ^/viewer(/.*)$ $1 break;
            proxy_pass http://viewer:8090;
        }

        # Block Management API from public access
        # Access via SSH tunnel: ssh -L 3001:localhost:3001 user@server
        location /api/v1/ {
            return 403 '{"error":"Management API not available on public endpoint. Use SSH tunnel."}';
            add_header Content-Type application/json;
        }

        # Block admin UI from public access
        location / {
            return 403 '{"error":"Admin UI not available on public endpoint. Use SSH tunnel."}';
            add_header Content-Type application/json;
        }
    }

    # Internal: full access on port 8080 (only bind to localhost via docker)
    server {
        listen 8080;
        server_name _;

        location / {
            proxy_pass http://cms:3001;
        }
    }
}
