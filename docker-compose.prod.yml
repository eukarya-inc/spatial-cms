services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: spatial_cms
      POSTGRES_USER: spatial_cms
      POSTGRES_PASSWORD: ${DB_PASSWORD:-spatial_cms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  cms:
    build: .
    environment:
      DATABASE_URL: postgresql://spatial_cms:${DB_PASSWORD:-spatial_cms}@db:5432/spatial_cms?schema=public
      PORT: "3001"
      DELIVERY_API_KEY_REQUIRED: "true"
    depends_on:
      - db
    restart: always

  viewer:
    build: ./examples/viewer
    environment:
      CMS_URL: http://cms:3001/api/v1
      CMS_API_KEY: ${VIEWER_API_KEY:-}
      PORT: "8090"
    depends_on:
      - cms
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "127.0.0.1:8080:8080"   # Internal-only: full CMS access via localhost
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cms
      - viewer
    restart: always

volumes:
  pgdata:
